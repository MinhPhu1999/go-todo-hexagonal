services:
  api:
    image: go-crub-db-api:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      ENV: development
      APP_ENV: development
      GIN_MODE: debug
      SERVER_PORT: "8080"
      SERVER_READ_TIMEOUT: 5s
      SERVER_WRITE_TIMEOUT: 10s
      SERVER_IDLE_TIMEOUT: 1m
      SERVER_SHUTDOWN_TIMEOUT: 10s
      CONTEXT_TIMEOUT: 2s
      MONGODB_URI: mongodb://mongodb:27017
      DB_NAME: todo_app
      TODO_COLLECTION: todos
      USER_COLLECTION: users
      MONGODB_CONNECT_TIMEOUT: 10s
      JWT_SECRET: ${JWT_SECRET:-Cg0ezBxLJrDkrYjzBgm/L+UJJkUo/AJcmv5zNr9WR6DMYY61Pf7ReWn5wNemYdRd}
      JWT_ISSUER: go-crud-db-p2
      JWT_EXPIRES_IN: 24h
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-423604342745-acr159ukgaf104nii9s2pm47e528tkro.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-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}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:5173/auth/google/callback}
      GOOGLE_STATE_TTL: 10m
      LOG_FORMAT: json
      LOG_FILE_PATH: /app/storage/logs/app.jsonl
      LOG_LEVEL: info
      LOG_TO_STDOUT: "true"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
